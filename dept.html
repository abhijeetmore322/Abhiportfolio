<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Departments</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <style>
        body {
            background: #49b39c;
        }

        .product-card {
            background: #fff;
            border: none;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .product-img {
            height: 320px;
            object-fit: cover;
            width: 100%;
        }

        .sale-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 80px;
            height: 60px;
            background: #74c043;
            color: white;
            border-radius: 10%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            font-size: 14px;
        }

        .icons {
            position: absolute;
            top: 20px;
            right: 15px;
        }

        .icons i {
            display: block;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        .price-old {
            text-decoration: line-through;
            color: #999;
            margin-right: 8px;
        }

        .rating {
            color: #74c043;
            font-size: 14px;
        }

        .add-cart {
            color: #74c043;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="text-center mt-5">
        <h2>Departments</h2>
    </div>
    <div class="container py-4">
        <div class="row g-4">
            <div class="col-lg-4 col-md-6">
                <div class="card product-card">
                    <span class="sale-badge bg-primary " > Engineering</span>

                    <img src="image/mech2.jpg" class="product-img" class="img-fluid">

                    <div class="card-body text-center">
                        <h4>  Mechanical Engineering</h4>
                            <div>
                            <button type="button" class="btn btn-outline-primary">Learn More</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="card product-card">
                    <span class="sale-badge bg-success"> Engineering</span>

                    <img src="image/elect2.jpg " class="product-img" class="img-fluid">

                    <div class="card-body text-center">
                        <h4>Electrical Engineering</h4>
                        <div>
                            <button type="button" class="btn btn-outline-success">Learn More</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="card product-card">
                    <span class="sale-badge bg-danger"> Engineering</span>

                    <img src="image/co2.jpg" class="product-img" class="img-fluid">

                    <div class="card-body text-center">
                        <h4>Computer Science Engineering</h4>
                        <div>
                            <button type="button" class="btn btn-outline-danger">Learn More</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <br>
        <br>
        <div class="row g-4">
            <div class="col-lg-4 col-md-6">
                <div class="card product-card">
                    <span class="sale-badge bg-secondary"> Engineering</span>

                    <img src="image/civil2.jpg" class="product-img" class="img-fluid">

                    <div class="card-body text-center">
                        <h4>Civil Engineering</h4>
                        <div>
                            <button type="button" class="btn btn-outline-secondary">Learn More</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="card product-card">
                    <span class="sale-badge bg-warning"> Engineering</span>

                    <img src="image/e&tc2.jpg" class="product-img" class="img-fluid">

                    <div class="card-body text-center">
                        <h4>Electronics & communication</h4>
                        <div>
                            <button type="button" class="btn btn-outline-warning">Learn More</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="card product-card">
                    <span class="sale-badge bg-info"> Engineering</span>

                    <img src="image/environment2.jpg" class="product-img" class="img-fluid">

                    <div class="card-body text-center">
                        <h4>Environmental Engineering</h4>
                        <div>
                            <button type="button" class="btn btn-outline-info">Learn More</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
