<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

 <style>
      body {
        background: #787e8f;
      }

      .product-card {
        background: #ffffff;
      }
    </style>

</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-5 shadow p-5 border rounded-4 product-card">
                <h2 class="text-center">Patient Registration form</h2>
                <div class="mt-3">
                    <p>Please Fill In Your Details As A New Patient</p>
                </div>
                <form class="bg-white">
                    <div >
                        <div class="row">
                            <div class="col mt-3">
                                <label for="">First Name :</label>
                                <input type="text" class="form-control" placeholder="First Name" name="email" />
                            </div>
                            <div class="col mt-4">
                                <label for="">Last Name :</label>
                                <input type="text" class="form-control" placeholder="Last Name" name="pswd" />
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6 mt-4">
                        <label for=""> Date Of Birth :</label>
                        <input type="date" class="form-control" placeholder="Last Name" >
                    </div>
                    <div class="col-lg-12 mt-4">
                        <label for="">Gender :</label>
                    </div>
                    <div class="col-lg-12 col-mt-4">
                        <input type="radio" name="grade" /> Male
                        <input type="radio" name="grade" style="margin-left: 50px" /> female
                        <input type="radio" name="grade" style="margin-left: 50px" /> Other
                    </div>
                    <div class="mb-3 mt-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" class="form-control" id="email" placeholder="Enter email" name="email" />
                    </div>
                    <div class="mb-3 mt-3">
                        <label for="email" class="form-label">Phone:</label>
                        <input type="Number" class="form-control" id="email" placeholder="Phone" />
                    </div>
                    <div>
                        <label for="comment">Address:</label>
                        <textarea class="form-control" rows="2" name="text"></textarea>
                    </div>
                    <div class="mb-3 mt-3">
                        <label for="email" class="form-label">Emergenct Contact Number:</label>
                        <input type="Number" class="form-control" id="email" placeholder="+1(555) 987-6543" />
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox"  >  I consent to the processing of my personal data in accordance with the Privacy Policy
                    </div>
                    <div class="text-center mt-3">
                       <input type="submit" name="" class="form-control btn btn-primary" value="Submit" >
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
